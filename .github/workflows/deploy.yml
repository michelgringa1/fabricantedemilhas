name: Build e publica na branch deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      # O pré-render abre cada rota num Chrome headless para salvar o HTML já
      # renderizado. Sem Chrome no runner, o build falha.
      - name: Chrome (para o pré-render)
        uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable

      - name: Build + pré-render das 20 rotas + sitemap/robots/llms
        run: pnpm run build:deploy
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}

      - name: Publicar dist/ na branch deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: deploy
          publish_dir: ./dist
          force_orphan: true
          commit_message: 'deploy: build de ${{ github.sha }}'
