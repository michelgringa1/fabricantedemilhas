ássico que transforma "renda extra" em dívida extra.'},{t:"h2",id:"riscos",text:"Os riscos, sem rodeio"},{t:"ul",items:["Programas proíbem comercialização de milhas em seus regulamentos; venda em escala pode gerar bloqueio e perda do saldo.","Plataforma de venda é contraparte privada: a crise 123milhas/HotMilhas (2023) deixou vendedores sem receber.","Regras, tabelas e bônus mudam sem aviso: a margem de hoje não é a de amanhã."]},{t:"cta"}],faq:[{q:"Quanto dá para ganhar por mês com milhas como renda extra?",a:"Não existe cifra honesta universal: o resultado é função dos seus gastos mensais, do capital de giro e das campanhas do período. Trate projeções fixas com desconfiança; o realista é um complemento variável que cresce com volume e experiência."},{q:"Milhas como renda extra exigem investimento?",a:"O motor básico são gastos que você já tem, concentrados num cartão que pontua, sem dinheiro novo. Escalar exige capital: compra de pontos em promoção e assinaturas de clube. Nunca financie gasto novo só para pontuar; juros superam qualquer margem."},{q:"Em quanto tempo vem o primeiro resultado?",a:"O ciclo completo (acumular pontos, transferir com bônus e vender o milheiro) costuma levar de 30 a 60 dias na primeira rodada. Quem espera retorno na primeira semana se frustra; quem opera ciclos sucessivos constrói consistência."},{q:"É seguro depender dessa renda?",a:"Não trate como renda para contas fixas: cotação oscila, regras mudam e plataformas carregam risco de contraparte. O uso saudável é como complemento: reserva de viagem, investimento ou renda adicional que, se atrasar um mês, não quebra seu orçamento."}],related:[{slug:"/como-ganhar-dinheiro-com-milhas/",anchor:"Guia completo: como ganhar dinheiro com milhas"},{slug:"/vender-milhas-aereas/",anchor:"Como vender milhas com segurança"},{slug:"/cursos-de-milhas/",anchor:"Vale a pena pagar um curso para acelerar?"}],checks:["Faixa de ciclo (30–60 dias) validada com campanhas recentes"]}],u=new Map(d.map(e=>[e.slug ercado. Preços de venda e custos de acúmulo são sempre expressos por milheiro (ex.: "milheiro a R$ 20").'},{id:"cotacao-do-milheiro",termo:"Cotação do milheiro",definicao:"Valor de mercado pago por mil milhas na venda, que varia por programa, prazo de recebimento e demanda. A Fabricante de Milhas publica uma tabela mensal de referência por programa."},{id:"transferencia-bonificada",termo:"Transferência bonificada",definicao:"Campanha em que o programa de pontos oferece bônus (historicamente entre 60% e 120%) para transferir pontos a um programa aéreo. É a principal técnica de multiplicação de saldo do mercado brasileiro."},{id:"clube-de-fidelidade",termo:"Clube de fidelidade (assinatura)",definicao:"Assinatura mensal que credita milhas ou pontos todo mês e costuma dar acesso a bônus maiores de transferência e promoções exclusivas. Vale a pena quando o benefício extra supera a mensalidade."},{id:"emissao",termo:"Emissão",definicao:"Ato de trocar milhas por uma passagem aérea. A qualidade de uma emissão se mede pelo valor embutido do milheiro: preço da passagem em dinheiro dividido pelas milhas exigidas."},{id:"taxa-de-embarque",termo:"Taxa de embarque",definicao:'Tarifa aeroportuária paga em dinheiro mesmo em passagens emitidas com milhas. É o motivo pelo qual "viajar de graça com milhas" significa, no rigor, pagar só as taxas.'},{id:"cpm",termo:"CPM (custo por milheiro)",definicao:'Quanto custa, em reais, "fabricar" mil milhas (somando gastos de cartão, assinaturas e compras de pontos). Lucra quem mantém o CPM abaixo da cotação de venda ou do valor de uso.'},{id:"smiles",termo:"Smiles",definicao:"Programa de fidelidade da GOL, um dos maiores do Brasil. Destaca-se pela malha doméstica, promoções frequentes e mercado líquido para venda de milhas."},{id:"latam-pass",termo:"LATAM Pass",definicao:"Programa de fidelidade da LATAM. Ponto forte em malha internacional e parcerias; as cotações de emissão variam bastante conforme rota e antecedência."},{id:"azul-fidelidade",termo:"Azul Fidelidade",definicao:"Programa de fidelidade da Azul (evolução do TudoAzul). Forte na cobertura de cidades médias brasileiras atendidas pela malha da companhia."},{id:"livelo",termo:"Livelo",definicao:"Programa de pontos ligado a grandes bancos brasileiros. Funciona como reservatório flexível: acumula pontos do cartão e de compras e os transfere a programas aéreos, com campanhas de bônus frequentes."},{id:"esfera",termo:"Esfera",definicao:"Programa de pontos do Santander, alternativa à Livelo como estoque flexível de pontos com campanhas de transferência bonificada para programas aéreos."},{id:"plataforma-de-venda",termo:"Plataforma de venda de milhas",definicao:"Empresa que intermedeia a venda de milhas entre titulares e emissores, pagando conforme prazo escolhido. É contraparte privada: a solidez da plataforma é parte do risco da operação, como mostrou a crise 123milhas/HotMilhas em 2023."},{id:"bloqueio-de-conta",termo:"Bloqueio de conta",definicao:"Sanção aplicada por programas de fidelidade a contas que violam o regulamento (tipicamente por comercialização de milhas), podendo incluir perda total do saldo."},{id:"sweet-spot",termo:"Sweet spot",definicao:"Emissão em que as milhas entregam valor muito acima da média, tipicamente voos internacionais ou de classe executiva em tabelas promocionais. É o uso que maximiza o valor por milha do saldo."}];function Z(){let e=(0,i.useMemo)(()=>[{"@type":"DefinedTermSet","@id":A+"/glossario-de-milhas/#set",name:"Glossário de milhas aéreas | Fabricante de Milhas",description:"Definições curtas e diretas dos termos do universo de milhas aéreas no Brasil.",hasDefinedTerm:H.map(e=>({"@type":"DefinedTerm","@id":A+"/glossario-de-milhas/#"+e.id,name:e.termo,description:e.definicao,inDefinedTermSet:A+"/glossario-de-milhas/#set"}))},k([["Glossário de milhas","/glossario-de-milhas/"]])],[]);return(0,s.jsxs)(s.Fragment,{children:[(0,s.jsx)(w,{title:"Glossário de Milhas: Termos Explicados | Fabricante de Milhas",description:"G rtais e pagamento de contas. O cartão acelera o processo, mas o evento se apresenta como acessível para quem ainda não tem um."},{q:"Preciso ganhar muito para acumular milhas?",a:"De acordo com o material oficial, não existe exigência de renda alta, e o conteúdo é apresentado como aplicável a partir de cerca de um salário mínimo. A lógica é aproveitar melhor gastos que já existem, como mercado, farmácia, combustível e contas de casa."},{q:"As 5.000 milhas são garantidas mesmo?",a:'Trate esse número como estimativa, não como garantia contratual. A página oficial usa a expressão "5.000 milhas garantidas", mas o volume real depende de você aplicar o que é ensinado durante os 5 dias. A Fabricante de Milhas não intermedeia esse crédito: confirme as condições na página oficial antes de contar com o benefício.'},{q:"O evento tem garantia se eu não gostar?",a:"Sim. A página oficial informa garantia de 7 dias com devolução integral do valor, sem necessidade de justificar. Na prática, dá para assistir ao conteúdo, avaliar se faz sentido para o seu momento e pedir reembolso dentro do prazo caso não sirva."},{q:"Vou conseguir assistir se tiver pouco tempo?",a:"O evento é anunciado como 5 encontros ao vivo que pedem cerca de uma hora por dia. É pouco tempo diário, mas exige presença durante a semana. Quem não consegue reservar essa hora tende a aproveitar pouco, já que o formato é prático e sequencial."},{q:"O que é ensinado em cada um dos 5 dias?",a:"A grade anunciada é sequencial: dia 1, organizar os gastos para ver onde a milha escapa; dia 2, resgatar milhas paradas em programas antigos; dia 3, o caminho das 5.000 milhas; dia 4, ligar a máquina de acúmulo com os gastos do dia a dia; e dia 5, transformar o saldo em passagem, viagem ou dinheiro."},{q:"Isso é a mesma coisa que o curso Fábrica de Milhas?",a:"Não. O Protocolo Destrave suas Milhas é um evento curto e de baixo investimento, com foco em destravar o acúmulo em 5 dias. O Fábrica de Milhas é o treinamento completo do mesmo produtor, com 8 níveis de conteúdo. Analisamos o curso completo em uma página dedicada."}],ef=[{dia:"Dia 1",icon:"data:image/avif;base64,AAAAIGZ0eXBhdmlmAAAAAGF2aWZtaWYxbWlhZk1BMUIAAAGNbWV0YQAAAAAAAAAoaGRscgAAAAAAAAAAcGljdAAAAAAAAAAAAAAAAGxpYmF2aWYAAAAADnBpdG0AAAAAAAEAAAAsaWxvYwAAAABEAAACAAEAAAABAAALvwAAVE0AAgAAAAEAAAG1AAAKCgAAAEJpaW5mAAAAAAACAAAAGmluZmUCAAAAAAEAAGF2MDFDb2xvcgAAAAAaaW5mZQIAAAAAAgAAYXYwMUFscGhhAAAAABppcmVmAAAAAAAAAA5hdXhsAAIAAQABAAAAw2lwcnAAAACdaXBjbwAAABRpc3BlAAAAAAAAA+gAAAPoAAAAEHBpeGkAAAAAAwgICAAAAAxhdjFDgQUMAAAAABNjb2xybmNseAACAAIABoAAAAAOcGl4aQAAAAABCAAAAAxhdjFDgQUcAAAAADhhdXhDAAAAAHVybjptcGVnOm1wZWdCOmNpY3A6c3lzdGVtczphdXhpbGlhcnk6YWxwaGEAAAAAHmlwbWEAAAAAAAAAAgABBAECgwQAAgQBBYYHAABeX21kYXQSAAoHGWZ+f5+FQDL8E0SAAooU9M4H2Ou/EiNf5eDof+ahu6fzki+Gnd0rLwhaq7w+AZujVEDjPqIJCQzvKp47uZz/eNW3qCUuHvtVk8Z/Tp/qVjFIHHc9tq+EqGLY5TJEJpskZni9Q38zhnc/xWrAV6uryVM0QaZ6YjO4HWekH18Q1VbsHny8ioAwilyuJ+rLMBD/eFH2ggUU53hRu1uAuuAZSovCdgGYzbV7K4Xbujwuvn5ikfpWwiAOnnIBDbHwK/79NKTQGiPpyykMX1uNpFtdAoqCdmQ1NkOSpAnnh58VcM47mrGNTy0sEr0uO7lwu5HCD1g0xWKHIbWl1Yd/U+eUH6ATmmnMDAj4WyFJDyMnY1/wXLvtwxm1vZidyFLgtmviLg3Sjtg4jwn81cLvkvNWviT8PkkI1iVkDH31sD7AyUbRxZSHDT5ny15Hs4MS7H/U96zy5ovvoAWImAmqfTGzkkG6E47t7QPiOsVpSG3gSmb+9ZUM081PIsArwU2/72LXNl67/QJ/nRP58hDscYfE9rHUjxSPJ3z7xWN3EjgmLbcglhtNEYh8Rr6Mi5CVvuzeqDTjatjLGARlBZJgTofYegcI5nKfxOjSkIrS8R34k+iQVBS42rUbU6ls76aMs+rALxtGvW2nmwxGy3LhY69o3DDNnkDRjGSlRhbjMDgtNBoXfShKSE1FIW6g+Y7rlSNH/7gqUqF01PVxwfsOEDrH0n6LnzFD0legmnHwCMYo5fm6AXB2NaIKEHOOIV9c16odtUZf7GmtHo/U7F9AA1s9B3oygedYlChc4Ecm4Cint4fkVhbpNpOUBUuJDS85r8XOboeHIwUvpgJNtXxxT5aOvMpHGkL+sIKCbT6uNBde+/OPPScCyNRX9sAqorxaJqYCtUut7lSaaW0MhcJpwzPN/jkFCdAsPbpmbDAclwOT7505fmXUtyTwrymT2DrQ4FKCjC4BADRYMG/hT2l9uYAnwktrMAmyTlGk2IL7nb7cMF39u3bXB8taX93TiOM7oeeQkTJB4zPAqCeaWm1Z0XkuJrcRyRIN0o8FJy7EGyk32YCrf3Q78xpcF2+6Gaq/4NK/J5Wl09Pv/3/hdasHJhTk0gvf+AkYSbf+k8c857QcGPQg1uEF5m93aryu5fpbvGE8KoAL3gMwkWkgMi1sn8fjoNJg+Vs3p9A1uy2jVdJm07gIcKB83VJDBMOYSAVYRCOHPJ54Hnjyaw5GZUfZ0NF86Yz0A4PZJH+0YfyhRsfzvY8hAYJ2ZutPkld
