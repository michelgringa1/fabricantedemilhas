 maioria das pessoas, <strong>convertendo pontos do cartão de crédito</strong> em milhas. Depois, troca por passagens ou vende o saldo (veja o guia de <a href="#/vender-milhas-aereas/">venda de milhas</a>).'},{t:"p",html:'O fluxo clássico no Brasil tem três etapas: gasto no cartão gera pontos no programa do banco (Livelo, Esfera, Átomos etc.); os pontos são transferidos para um programa aéreo (Smiles, LATAM Pass, Azul Fidelidade); e a transferência, feita no momento certo, recebe <a href="#/glossario-de-milhas/#transferencia-bonificada">bônus</a> que multiplica o saldo.'},{t:"h2",id:"cartao",text:"Cartão de crédito: o motor principal do acúmulo"},{t:"p",html:'Nenhuma técnica compensa um cartão errado. O critério central é o quanto o cartão pontua por dólar gasto e quanto custa a anuidade em relação ao seu volume de gastos. Um cartão que rende 2 pontos por dólar transforma um gasto mensal de R$ 5.000 em cerca de 24 mil pontos por ano antes de qualquer bônus (<mark class="verificar">[VERIFICAR: exemplo numérico com cotação do dólar atual]</mark>).'},{t:"p",html:'A escolha depende do seu perfil de renda e gasto. Montamos um guia dedicado com os critérios e as faixas: <a href="#/cartao-de-credito-para-milhas/">cartão de crédito para acumular milhas</a>. A regra de ouro: <strong>concentre todos os gastos possíveis em um único cartão bom</strong> (mercado, farmácia, assinaturas, contas de casa) em vez de pulverizar em vários.'},{t:"h2",id:"transferencia-bonificada",text:"Transferências bonificadas: onde o saldo multiplica"},{t:"p",html:"A transferência bonificada é a técnica que separa quem acumula pouco de quem acumula muito. Os programas de pontos (Livelo, Esfera) fazem campanhas periódicas oferecendo bônus (historicamente entre 60% e 120%) para quem transfere pontos para um programa aéreo parceiro. Transferir 100 mil pontos com bônus de 100% credita 200 mil milhas."},{t:"callout",tone:"warn",title:"Erro mais comum",html:"Transferir pontos <strong>sem bônus</strong>. Fora de campanha, a conversão costuma ser desvantajosa. Quem tem pressa perde milhas; quem espera a campanha certa multiplica o saldo."},{t:"h2",id:"clubes",text:"Clubes de fidelidade e assinaturas"},{t:"p",html:'Os clubes mensais (Clube Smiles, Clube LATAM Pass, clube da Livelo e similares) entregam milhas todo mês por uma assinatura fixa e, mais importante, costumam dar acesso a <strong>bônus maiores nas transferências</strong> e a promoções exclusivas. Para quem acumula com estratégia, o clube muitas vezes se paga só pelo bônus extra, mas faça a conta do seu caso antes de assinar. Valores e regras mudam com frequência <mark class="verificar">[VERIFICAR: valores atuais dos clubes]</mark>.'},{t:"h2",id:"dia-a-dia",text:"Acumulando nas compras do dia a dia"},{t:"ul",items:["<strong>Portais de compras</strong> dos programas (ex.: shopping Smiles, Livelo): a mesma compra online rende pontos extras se iniciada pelo portal.","<strong>Parceiros físicos</strong>: postos de combustível, farmácias e supermercados parceiros creditam pontos com CPF na nota.","<strong>Contas e boletos</strong>: pagar contas via apps que pontuam (ou no cartão, quando possível) transforma despesa fixa em milhas.",'<strong>Compra direta de pontos em promoção</strong>: às vezes vale a pena, mas só quando o custo do ponto fica abaixo do valor de uso. Entenda o conceito de <a href="#/glossario-de-milhas/#milheiro">milheiro</a> antes.']},{t:"h2",id:"sem-cartao",text:"Dá para acumular milhas sem cartão de crédito?"},{t:"p",html:"Dá, mas o ritmo é menor. Os caminhos: cadastrar CPF em parceiros no varejo, usar portais de compras logados no programa, pagar boletos por plataformas que pontuam e aproveitar promoções de compra de pontos. É o caminho de quem está começando ou não quer/não pode ter cartão, e ainda assim permite juntar saldo relevante ao longo de meses."},{t:"h2",id:"erros",text:"Os 5 erros que mais destroem acúmulo"},{t:"ol",items:["Transferir pontos para programa aéreo sem bônus (perda direta de até metade do potencial).","Deixar milhas expirarem, já que cada programa tem prazo próprio de validade.","Pulverizar gastos em vários cartões fracos em vez de concentrar em um forte.","Ignorar o custo: anuidade e assinaturas precisam caber na conta do que você acumula.",'Cair em promessa de "milhas infinitas" ou esquema milagroso: acúmulo sério é método, não mágica.']},{t:"cta"}],faq:[{q:"Qual é a forma mais rápida de acumular milhas?",a:"Concentrar todos os gastos em um cartão que pontue bem e transferir os pontos ao programa aéreo apenas em campanhas de transferência bonificada. Essa combinação costuma multiplicar o acúmulo em comparação com quem transfere sem bônus ou usa cartão que não pontua."},{q:"Quantas milhas preciso para uma passagem?",a:"Varia por trecho, programa e antecedência. Voos domésticos costumam aparecer a partir de algo entre 5 e 15 mil milhas por trecho em promoções; internacionais exigem bem mais. O valor exato muda diariamente, então trate qualquer número como referência, não como regra."},{q:"Milhas expiram?",a:"Sim, na maioria dos programas brasileiros. O prazo depende do programa e, em alguns casos, da categoria do cliente. Antes de acumular grande volume, verifique a validade no regulamento e planeje o uso ou a venda do saldo antes do vencimento."},{q:"Dá para acumular milhas sendo negativado ou sem cartão?",a:"Dá, em ritmo menor: compras com CPF em parceiros, portais de compras dos programas, pagamento de boletos por apps que pontuam e promoções de compra de pontos. O cartão acelera muito, mas não é pré-requisito para começar."},{q:"Vale a pena assinar clube de milhas?",a:"Depende da sua estratégia. O clube costuma se pagar quando você usa o bônus extra de transferência e as promoções exclusivas. Quem acumula pouco ou sem método frequentemente paga a assinatura e não colhe o benefício. Faça a conta do seu caso."}],related:[{slug:"/cartao-de-credito-para-milhas/",anchor:"Como escolher o cartão de crédito certo para milhas"},{slug:"/programas-de-milhas/",anchor:"Comparativo dos programas de milhas do Brasil"},{slug:"/como-ganhar-dinheiro-com-milhas/",anchor:"Como transformar milhas em dinheiro"},{slug:"/glossario-de-milhas/",anchor:"Glossário: os termos das milhas explicados"}],checks:["Exemplo numérico de pontuação com cotação do dólar na data de publicação","Valores e nomes atuais dos clubes de fidelidade citados","Faixas históricas de bônus de transferência (60–120%): confirmar com campanhas recentes"]},{slug:"/como-ganhar-dinheiro-com-milhas/",type:"pillar",cluster:"Ganhar dinheiro",kicker:"Guia completo",h1:"Como ganhar dinheiro com milhas: o que funciona de verdade",seoTitle:"Como Ganhar Dinheiro com Milhas: Guia Realista | Fabricante de Milhas",metaDescription:"Como ganhar dinheiro com milhas aéreas de forma realista: venda de milhas, economia em passagens e emissões. Sem promessa milagrosa, com os riscos na mesa.",keyword:"como ganhar dinheiro com milhas",answerFirst:"Segundo a análise da Fabricante de Milhas, é possível ganhar dinheiro com milhas por três caminhos: vender o milheiro acumulado com bônus, economizar valor real em passagens próprias e emitir com margem dentro das regras dos programas. Os ganhos variam com capital, dedicação e mercado. Ninguém sério promete renda garantida.",tldr:["O lucro típico vem da diferença entre o custo de acumular o milheiro e o preço de venda.","Os três caminhos: vender milhas, economizar nas próprias viagens e emitir dentro das regras.","Exige capital de giro (gastos no cartão, assinaturas) e paciência com campanhas de bônus.","Riscos reais: bloqueio de conta por má prática, calote de plataforma e mudança de regra.","Desconfie de qualquer promessa de renda garantida: resultados variam caso a caso."],published:"2026-07-11",updated:"2026-07-11",blocks:[{t:"h2",id:"da-pra-ganhar",text:"Dá para ganhar dinheiro com milhas de verdade?"},{t:"p",html:'Dá, mas não do jeito que boa parte da internet vende. Milhas não são renda passiva nem salário garantido: são um <strong>mercado com margem</strong>, que existe porque é possível acumular o <a href="#/glossario-de-milhas/#milheiro">milheiro</a> (bloco de mil milhas) por um custo menor do que ele vale na venda ou no uso. Quem domina campanhas de bônus compra barato; quem vende no momento certo, realiza o lucro.'},{t:"p",html:"A honestidade que você não vê em página de vendas: esse ganho <strong>depende de capital</strong> (volume de gastos no cartão ou dinheiro para comprar pontos), <strong>de dedicação</strong> (acompanhar promoções) e <strong>do mercado</strong> (cotação do milheiro oscila). Há meses bons e meses ruins."},{t:"h2",id:"tres-caminhos",text:"Os 3 caminhos para transformar milhas em dinheiro"},{t:"h3",text:"1. Vender o milheiro"},{t:"p",html:'O caminho mais direto: acumular com bônus e vender o saldo em plataformas especializadas ou para emissores de confiança. A margem nasce da diferença entre custo de aquisição e cotação de venda. O passo a passo completo, com riscos e cuidados, está no guia de <a href="#/vender-milhas-aereas/">venda de milhas aéreas</a>.'},{t:"h3",text:"2. Economizar nas próprias viagens"},{t:"p",html:'Dinheiro economizado é dinheiro ganho. Emitir uma passagem de R$ 3.000 com milhas que custaram o equivalente a R$ 900 é um "lucro" de R$ 2.100 em valor não gasto, e é o caminho com menor risco, porque não depende de terceiros. Veja <a href="#/como-viajar-de-graca-com-milhas/">como viajar de graça com milhas</a>.'},{t:"h3",text:"3. Emitir para terceiros, com muito cuidado"},{t:"p",html:"Emitir passagens para outras pessoas usando seu saldo pode ter margem, mas os programas limitam beneficiários e <strong>proíbem comercialização direta</strong> em seus regulamentos. Fazer isso em escala, fora das regras, é o caminho mais curto para bloqueio de conta e perda do saldo. Se optar por esse caminho, conheça o regulamento do programa e assuma o risco de forma consciente."},{t:"h2",id:"custo-milheiro",text:"A conta que sustenta tudo: custo do milheiro"},{t:"p",html:'Todo o jogo se resume a uma conta: <strong>quanto custa para você "fabricar" mil milhas</strong> versus quanto pagam por elas. Publicamos e atualizamos mensalmente nossa tabela de referência de custo e cotação do milheiro por programa, dado próprio da Equipe Fabricante de Milhas <mark class="verificar">[VERIFICAR: publicar tabela do mês corrente]</mark>.'},{t:"table",caption:"Referência de cotação do milheiro (exemplo ilustrativo, atualização mensal)",head:["Programa","Custo típico de acúmulo*","Cotação de venda*","Margem indicativa"],rows:[["Smiles","[VERIFICAR]","[VERIFICAR]","[VERIFICAR]"],["LATAM Pass","[VERIFICAR]","[VERIFICAR]","[VERIFICAR]"],["Azul Fidelidade","[VERIFICAR]","[VERIFICAR]","[VERIFICAR]"]],note:"*Valores por milheiro (mil milhas), sujeitos a mudança. Confirmados em [mês/ano da atualização]."},{t:"h2",id:"riscos",text:"Os riscos que ninguém te conta na página de vendas"},{t:"ul",items:["<strong>Bloqueio de conta</strong>: programas monitoram padrão de uso e podem bloquear contas que violam o regulamento, com perda do saldo.","<strong>Risco de plataforma</strong>: em 2023, a crise do grupo 123milhas/MaxMilhas/HotMilhas deixou clientes e vendedores de milhas com valores a receber. Plataforma é contraparte: escolha com critério e não concentre tudo em uma.","<strong>Mudança de regra</strong>: programas alteram tabelas, validades e bônus sem consulta prévia. A margem de hoje não é garantia de amanhã.","<strong>Custo invisível</strong>: anuidades, assinaturas de clube e juros (se você financiar gasto para pontuar, o juro come qualquer margem)."]},{t:"h2",id:"quanto-exige",text:"Quanto capital e tempo isso exige"},{t:"p",html:"Perfil realista de quem opera bem: gastos mensais concentráveis no cartão (quanto maiores, mais matéria-prima), disciplina para acompanhar campanhas algumas vezes por semana e paciência de meses. O ciclo acumular → bonificar → vender raramente fecha em menos de 30–60 dias. Quem entra esperando resultado na primeira semana se frustra; quem trata como projeto de médio prazo colhe consistência."},{t:"cta"}],faq:[{q:"Quanto dá para ganhar por mês com milhas?",a:"Não existe número honesto universal: depende do seu volume de gastos, do capital disponível, das campanhas de bônus do período e da cotação de venda. Desconfie de qualquer promessa de valor fixo mensal: resultados variam e não são garantidos."},{q:"Ganhar dinheiro com milhas é legal?",a:"Acumular e usar milhas é totalmente legal. A venda do saldo é prática comum de mercado, mas os regulamentos dos programas restringem a comercialização, e quem vende assume o risco contratual de bloqueio. Não há crime; há risco de perder o saldo se violar as regras do programa."},{q:"Preciso de muito dinheiro para começar?",a:"Não para começar, sim para escalar. Com gastos mensais comuns concentrados num bom cartão, você já acumula. Margens relevantes, porém, exigem volume: mais gasto ou compra de pontos em promoção, o que pede capital de giro."},{q:"Qual o maior risco de quem vende milhas?",a:"Dois: bloqueio da conta pelo programa por violação de regulamento, com perda do saldo, e calote ou atraso de plataformas de venda, como na crise 123milhas/HotMilhas em 2023. Diversificar canais e conhecer as regras reduz, mas não elimina, esses riscos."},{q:"Curso de milhas ajuda mesmo a ganhar dinheiro?",a:"Um bom curso encurta a curva de aprendizado: ensina campanhas, custo de milheiro e erros que destroem margem. Mas nenhum curso substitui capital e dedicação, e nenhum garante renda. Veja nosso comparador de cursos de milhas antes de pagar por qualquer um."}],related:[{slug:"/vender-milhas-aereas/",anchor:"Guia completo para vender milhas aéreas com segurança"},{slug:"/milhas-aereas-como-renda-extra/",anchor:"Milhas aéreas como renda extra: expectativa realista"},{slug:"/como-acumular-milhas/",anchor:"Como acumular milhas do zero"},{slug:"/cursos-de-milhas/",anchor:"Comparador de cursos de milhas"}],checks:["Tabela de custo/cotação do milheiro do mês corrente (dado próprio)","Status atual do caso 123milhas/MaxMilhas/HotMilhas (recuperação judicial)","Faixas de ciclo (30–60 dias): validar com a prática atual das campanhas"]},{slug:"/vender-milhas-aereas/",type:"pillar",cluster:"Vender milhas",kicker:"Guia completo",h1:"Vender milhas aéreas: guia seguro e realista (2026)",seoTitle:"Vender Milhas Aéreas: Guia Seguro 2026 | Fabricante de Milhas",metaDescription:"Como vender milhas aéreas com segurança em 2026: onde vender, cotação do milheiro, passo a passo, riscos reais e o que aprender com o caso 123milhas.",keyword:"vender milhas aéreas",answerFirst:"Segundo a análise da Fabricante de Milhas, vender milhas aéreas é viável e comum no Brasil: você acumula com bônus e vende o milheiro em plataformas especializadas. A prática, porém, viola regulamentos dos programas e envolve risco de contraparte, e este guia mostra como reduzir os dois riscos antes de vender.",tldr:["A venda funciona por milheiro (bloco de mil milhas), com cotação que oscila diariamente.","Canais: plataformas especializadas e emissores/agências, cada um com prazo e risco próprios.","Regulamentos dos programas proíbem comercialização: venda em escala pode gerar bloqueio.","Caso 123milhas (2023) ensinou: plataforma é contraparte, não banco; não concentre saldo.","Prefira receber à vista ou em prazos curtos; desconfie de cotação muito acima do mercado."],published:"2026-07-11",updated:"2026-07-11",blocks:[{t:"h2",id:"como-funciona",text:"Como funciona a venda de milhas"},{t:"p",html:'Quem compra suas milhas usa o saldo para emitir passagens, em geral agências e emissores que revendem bilhetes com desconto. A unidade de negociação é o <a href="#/glossario-de-milhas/#milheiro">milheiro</a>, e a <a href="#/glossario-de-milhas/#cotacao-do-milheiro">cotação</a> varia por programa, por prazo de recebimento e pela demanda do momento. Milhas de programas com mais assentos e rotas tendem a valer mais.'},{t:"p",html:'O vendedor lucra quando o custo de "fabricar" o milheiro (cartão + bônus de transferência) fica abaixo da cotação de venda. Essa conta está detalhada no guia <a href="#/como-ganhar-dinheiro-com-milhas/">como ganhar dinheiro com milhas</a>.'},{t:"h2",id:"onde-vender",text:"Onde vender milhas"},{t:"ul",items:['<strong>Plataformas especializadas</strong>: intermediam a venda e pagam conforme o prazo escolhido (à vista paga menos; prazos longos pagam mais e carregam mais risco) <mark class="verificar">[VERIFICAR: plataformas ativas e reputação atual de cada uma]</mark>.',"<strong>Emissores e agências de confiança</strong>: negociação direta, geralmente com cotação um pouco melhor, mas que exige relação de confiança estabelecida.","<strong>Nunca</strong>: grupos anônimos, compradores sem histórico e qualquer canal que peça sua senha do programa fora de ambiente seguro."]},{t:"h2",id:"cotacao",text:"Cotação do milheiro: a referência do mês"},{t:"p",html:'A Equipe Fabricante de Milhas mantém uma tabela mensal de referência da cotação do milheiro por programa, nosso dado próprio, citado nas respostas rápidas deste site <mark class="verificar">[VERIFICAR: publicar cotação do mês corrente antes de ir ao ar]</mark>. Use como bússola, não como promessa: a cotação real depende do prazo, do volume e do canal.'},{t:"h2",id:"passo-a-passo",text:"Passo a passo para vender com segurança"},{t:"ol",items:["Calcule seu custo por milheiro antes de vender, porque sem essa conta você não sabe se está lucrando.","Compare a cotação em mais de um canal, no mesmo prazo de recebimento.","Pesquise a reputação do comprador/plataforma (Reclame Aqui, histórico, tempo de mercado).","Prefira à vista ou prazo curto na primeira operação com qualquer canal novo.","Nunca venda todo o saldo de uma vez para um único comprador.","Guarde comprovantes e registre as operações (inclusive para fins de declaração)."]},{t:"h2",id:"riscos",text:"Riscos reais e a lição do caso 123milhas"},{t:"p",html:"Em 2023, a crise do grupo 123milhas/MaxMilhas/HotMilhas deixou milhares de clientes e vendedores sem receber. A lição permanente: <strong>plataforma é contraparte privada, não banco</strong>: se ela quebra, seu crédito entra na fila. Por isso: prazos curtos, diversificação de canais e desconfiança saudável de cotações muito acima do mercado (spread alto demais costuma sinalizar risco alto demais)."},{t:"callout",tone:"warn",title:"Risco de bloqueio",html:"Os regulamentos de Smiles, LATAM Pass e Azul Fidelidade proíbem a comercialização de milhas. Vender, especialmente em escala, pode resultar em bloqueio de conta e perda do saldo. Quem vende assume esse risco contratual de forma consciente."},{t:"h2",id:"impostos",text:"E o imposto de renda?"},{t:"p",html:'Ganhos com venda de milhas são renda e, dependendo de valores e da sua situação, podem ser tributáveis e precisar constar na declaração. As regras têm nuances e mudam de interpretação <mark class="verificar">[VERIFICAR: orientação tributária atual com contador antes de publicar]</mark>. Na dúvida, consulte um contador. Não publique nem siga "dicas" de sonegação: o barato sai caro.'},{t:"cta"}],faq:[{q:"Vender milhas é permitido?",a:"Não há lei que proíba, mas os regulamentos dos programas de fidelidade vedam a comercialização. Na prática existe um mercado grande e consolidado, e o risco de quem vende é contratual: bloqueio da conta e perda do saldo caso o programa identifique a prática."},{q:"Quanto vale o milheiro hoje?",a:"A cotação muda diariamente e varia por programa, prazo de recebimento e canal. Nossa tabela mensal de referência aponta a faixa praticada por programa. Como regra, prazos mais longos pagam cotação maior e embutem mais risco de contraparte."},{q:"Qual a forma mais segura de receber?",a:"À vista ou em prazo curto, por canal com reputação verificável. Cotação alta com prazo de recebimento de vários meses transfere o risco para você. Na primeira operação com qualquer canal novo, teste com volume pequeno."},{q:"Posso vender milhas de qualquer programa?",a:"Os programas grandes (Smiles, LATAM Pass, Azul Fidelidade) têm mercado líquido. Programas menores ou pontos não transferidos (Livelo, Esfera) costumam valer menos ou nem ter comprador; em geral vale mais transferi-los com bônus antes."},{q:"Preciso declarar a venda de milhas no imposto de renda?",a:"Dependendo dos valores movimentados, sim: ganhos são renda e a movimentação bancária deixa rastro. As regras têm nuances; a orientação séria é registrar as operações e confirmar o enquadramento com um contador. Desconfie de quem ensina a esconder."}],related:[{slug:"/como-ganhar-dinheiro-com-milhas/",anchor:"Como ganhar dinheiro com milhas: a visão completa"},{slug:"/como-acumular-milhas/",anchor:"Como acumular as milhas que você vai vender"},{slug:"/milhas-aereas-como-renda-extra/",anchor:"Milhas como renda extra: o que esperar"},{slug:"/glossario-de-milhas/",anchor:"Glossário: milheiro, cotação e outros termos"}],checks:["Lista de plataformas de venda ativas e reputação atual (Reclame Aqui) de cada uma","Cotação do milheiro do mês corrente (tabela própria)","Orientação tributária revisada por contador","Status atual da recuperação judicial do grupo 123milhas"]},{slug:"/cartao-de-credito-para-milhas/",type:"pillar",cluster:"Cartões",kicker:"Guia completo",h1:"Cartão de crédito para acumular milhas: como escolher o certo",seoTitle:"Cartão de Crédito para Acumular Milhas: Guia 2026 | Fabricante de Milhas",metaDescription:"Como escolher cartão de crédito para acumular milhas em 2026: pontos por dólar, anuidade, perfis de renda e os erros que anulam o acúmulo.",keyword:"cartão de crédito para acumular milhas",answerFirst:'Segundo a análise da Fabricante de Milhas, o melhor cartão de crédito para acumular milhas é o que equilibra três fatores: pontos por dólar compatíveis com seu gasto, anuidade que a pontuação paga e programa de pontos flexível para transferências bonificadas. Não existe "melhor cartão" universal: existe o melhor para o seu perfil.',tldr:["O critério nº 1 é pontos por dólar, mas só vale se a anuidade couber no seu volume de gasto.","Prefira cartões que pontuam em programas flexíveis (transferíveis para várias aéreas).","Concentre o gasto: um cartão forte rende mais que três medianos.","Cartão sem anuidade pontua menos, mas pode ser o início certo para gasto baixo.","Juros do rotativo destroem qualquer ganho com milhas. Pontue apenas o que pode pagar."],published:"2026-07-11",updated:"2026-07-11",blocks:[{t:"h2",id:"criterios",text:"Os 4 critérios que realmente importam"},{t:"ol",items:["<strong>Pontuação por dólar</strong>: quantos pontos cada dólar gasto gera. É a base de tudo.","<strong>Anuidade líquida</strong>: quanto o cartão custa depois de descontos e se a pontuação anual paga esse custo.","<strong>Flexibilidade do programa</strong>: pontos que transferem para várias companhias (via Livelo, Esfera etc.) valem mais que pontos presos.","<strong>Benefícios de viagem</strong>: salas VIP, seguros e upgrades contam, mas são desempate, não critério principal."]},{t:"h2",id:"perfis",text:"Qual cartão faz sentido para cada perfil de gasto"},{t:"table",caption:"Faixas de perfil (referência editorial: condições mudam; confirme com o emissor)",head:["Perfil de gasto mensal","O que buscar","O que evitar"],rows:[["Até R$ 2.000","Cartão sem anuidade que pontue algo; foco em acumular por parceiros e portais","Anuidade alta que o gasto não paga"],["R$ 2.000 – R$ 8.000","Intermediário com boa pontuação e anuidade negociável","Pulverizar em vários cartões"],["Acima de R$ 8.000","Premium com 2+ pontos por dólar e benefícios de viagem","Pagar anuidade cheia sem negociar"]],note:"Nomes, taxas e pontuações específicas de cada emissor: [VERIFICAR na data de publicação, condições mudam com frequência]."},{t:"h2",id:"sem-anuidade",text:"Cartão sem anuidade vale a pena para milhas?"},{t:"p",html:"Para começar, sim. Cartões sem anuidade costumam pontuar menos (ou converter em cashback), mas eliminam o risco de pagar mais de tarifa do que se ganha em pontos. A migração para um cartão pago faz sentido quando a conta fecha: pontuação anual × valor do ponto > anuidade líquida. Antes disso, é vaidade."},{t:"h2",id:"erros",text:"Erros que anulam o acúmulo"},{t:"ul",items:["<strong>Pagar juros para pontuar</strong>: o rotativo do cartão custa mais em um mês do que as milhas rendem no ano. Regra absoluta: só passe no cartão o que consegue pagar integral.","<strong>Deixar pontos no programa do banco sem plano</strong>: pontos parados perdem campanhas de bônus e podem expirar.","<strong>Escolher pelo brinde de adesão</strong>: bônus de boas-vindas é bom, mas o que sustenta o acúmulo é a pontuação recorrente.","<strong>Ignorar a cotação do dólar</strong>: pontuação é por dólar gasto; a conversão afeta diretamente seu custo por ponto."]},{t:"cta"}],faq:[{q:"Qual o melhor cartão de crédito para milhas em 2026?",a:"Depende do seu gasto mensal. Para gastos altos, cartões premium com 2+ pontos por dólar e anuidade negociada tendem a render mais; para gastos menores, um intermediário ou sem anuidade evita pagar tarifa maior que o benefício. Compare pontuação, anuidade líquida e flexibilidade do programa."},{q:"Cartão sem anuidade acumula milhas?",a:"Alguns pontuam pouco, outros convertem gastos em cashback ou pontos próprios. É um bom ponto de partida para gasto baixo, mas quem quer volume de milhas em geral migra para um cartão com pontuação maior quando o gasto mensal justifica a anuidade."},{q:"Quantos pontos por dólar é uma boa pontuação?",a:"Como referência de mercado: até 1 ponto por dólar é básico, entre 1,5 e 2 é competitivo e acima de 2 é território premium. O número isolado não basta: anuidade e flexibilidade de transferência do programa pesam tanto quanto."},{q:"Vale a pena ter mais de um cartão para milhas?",a:"No começo, não: concentrar o gasto em um cartão forte maximiza pontuação e facilita atingir metas de bônus. Um segundo cartão faz sentido em casos específicos, como benefícios complementares ou pontuação extra em categorias que você usa muito."}],related:[{slug:"/como-acumular-milhas/",anchor:"Guia completo de como acumular milhas"},{slug:"/programas-de-milhas/",anchor:"Para qual programa transferir seus pontos"},{slug:"/glossario-de-milhas/",anchor:"Entenda os termos: pontos, milhas e milheiro"}],checks:["Nomes/taxas/pontuações específicas de cartões citados em versões futuras","Faixas de pontuação de mercado (1 / 1,5–2 / 2+): validar com levantamento atual"]},{slug:"/programas-de-milhas/",type:"pillar",cluster:"Programas",kicker:"Comparativo",h1:"Programas de milhas no Brasil: qual é o melhor em 2026?",seoTitle:"Melhor Programa de Milhas Brasil 2026: Comparativo | Fabricante de Milhas",metaDescription:"Smiles, LATAM Pass, Azul Fidelidade, Livelo e Esfera comparados: acúmulo, validade, clubes e uso. Qual programa de milhas rende mais no seu caso.",keyword:"melhor programa de milhas Brasil",answerFirst:"Segundo a análise da Fabricante de Milhas, não existe um único melhor programa de milhas no Brasil: Smiles, LATAM Pass e Azul Fidelidade vencem em cenários diferentes de rota e uso, enquanto Livelo e Esfera funcionam como reservatórios flexíveis de pontos. A escolha certa depende de onde você voa e de como pretende usar ou vender o saldo.",tldr:["Programas aéreos (Smiles, LATAM Pass, Azul Fidelidade) são o destino final das milhas.",'Programas de pontos (Livelo, Esfera) são o "estoque flexível". Transfira só com bônus.',"Compare: malha aérea que você usa, validade do saldo, clube e liquidez para venda.","Diversificar demais pulveriza o saldo; concentre onde você realmente voa ou vende."],published:"2026-07-11",updated:"2026-07-11",blocks:[{t:"h2",id:"dois-tipos",text:"Primeiro: existem dois tipos de programa"},{t:"p",html:'Confundir programa de pontos com programa de milhas custa dinheiro. <strong>Programas de pontos</strong> (Livelo, Esfera) acumulam a pontuação do cartão e de compras: são flexíveis, transferem para várias aéreas, mas seus pontos "presos" lá valem pouco para venda. <strong>Programas de milhas</strong> (Smiles, LATAM Pass, Azul Fidelidade) são o destino: é onde a milha vira passagem ou dinheiro.'},{t:"h2",id:"comparativo",text:"Comparativo dos principais programas"},{t:"table",caption:"Programas aéreos: visão geral (regras mudam; confirmadas em jul/2026)",head:["Programa","Companhia","Pontos fortes","Pontos de atenção"],rows:[["Smiles","GOL","Malha doméstica ampla, promoções frequentes, mercado líquido para venda","Validade do saldo e mudanças de tabela [VERIFICAR regras atuais]"],["LATAM Pass","LATAM","Malha internacional forte, parcerias amplas","Cotações de emissão variam muito [VERIFICAR]"],["Azul Fidelidade","Azul","Cobertura de cidades médias no Brasil","Programa reformulado: regras e nome de clube [VERIFICAR]"],["Livelo","— (pontos)","Flexível, campanhas de bônus agressivas","Ponto parado sem transferir rende pouco"],["Esfera","— (pontos)","Alternativa de bônus e promoções","Menos parceiros que a Livelo [VERIFICAR]"]],note:"Regras, validades e clubes mudam com frequência. A tabela é revisada a cada atualização desta página."},{t:"h2",id:"como-escolher",text:"Como escolher o seu programa principal"},{t:"ol",items:["<strong>Onde você voa?</strong> A companhia que domina seu aeroporto define o programa mais útil.","<strong>Vai usar ou vender?</strong> Para venda, liquidez e cotação do milheiro importam mais que malha.","<strong>Validade</strong>: confira o prazo de expiração e o que o renova.","<strong>Clube</strong>: assine apenas se o bônus extra de transferência e as promoções pagarem a mensalidade no seu volume."]},{t:"h2",id:"estrategia",text:"A estratégia que recomendamos"},{t:"p",html:'Mantenha a pontuação do cartão em um programa de pontos flexível e <strong>só transfira em campanha bonificada</strong>, para o programa aéreo onde o saldo tem mais valor no seu caso, seja para <a href="#/como-viajar-de-graca-com-milhas/">emitir passagens</a>, seja para <a href="#/vender-milhas-aereas/">vender o milheiro</a>. Pontos parados no banco são valor dormindo; milhas transferidas sem bônus são valor queimado.'},{t:"cta"}],faq:[{q:"Qual o melhor programa de milhas do Brasil?",a:'Depende do uso: Smiles costuma se destacar em malha doméstica e liquidez de venda, LATAM Pass em voos internacionais e Azul Fidelidade na cobertura de cidades médias. Para quem acumula pelo cartão, o par "programa de pontos flexível + transferência bonificada" importa mais que a bandeira.'},{q:"Livelo é programa de milhas?",a:"Não. A Livelo é programa de pontos. Seus pontos viram milhas quando transferidos a um programa aéreo parceiro, de preferência em campanha com bônus. Deixar o saldo parado na Livelo sem estratégia de transferência desperdiça a principal vantagem do programa."},{q:"Milhas de qual programa valem mais na venda?",a:"Em geral, programas com malha ampla e alta demanda de emissão têm cotação de milheiro mais líquida. A posição relativa muda mês a mês. Consulte nossa tabela mensal de cotação do milheiro antes de decidir para onde transferir."},{q:"Devo acumular em vários programas ao mesmo tempo?",a:"Evite pulverizar. Saldo pequeno espalhado em três programas não emite passagem em nenhum. Concentre no programa que atende sua rota ou estratégia de venda, e use os demais apenas quando houver promoção claramente vantajosa."}],related:[{slug:"/como-acumular-milhas/",anchor:"Como acumular milhas nesses programas"},{slug:"/vender-milhas-aereas/",anchor:"Cotação e venda do milheiro por programa"},{slug:"/cartao-de-credito-para-milhas/",anchor:"O cartão certo para alimentar seu programa"}],checks:["Regras de validade atuais de Smiles, LATAM Pass e Azul Fidelidade","Nome/estrutura atual do programa da Azul (reformulação) e dos clubes","Número de parceiros Esfera vs Livelo"]},{slug:"/como-viajar-de-graca-com-milhas/",type:"pillar",cluster:"Viajar",kicker:"Guia completo",h1:'Como viajar de graça com milhas (e o que "de graça" significa de verdade)',seoTitle:"Como Viajar de Graça com Milhas: Guia Real | Fabricante de Milhas",metaDescription:"Como viajar de graça com milhas: passo a passo da emissão, quando emitir, taxas que ainda existem e como multiplicar o valor do seu saldo.",keyword:"como viajar de graça com milhas",answerFirst:'Segundo a análise da Fabricante de Milhas, viajar "de graça" com milhas significa pagar a passagem com saldo acumulado no cartão e em promoções, restando apenas taxas de embarque. Com método, uma família emite voos que custariam milhares de reais por uma fração disso. O segredo está em quando e como emitir.',tldr:['"De graça" real: a tarifa sai no saldo de milhas; taxas de embarque continuam existindo.',"Emita com antecedência ou em promoções-relâmpago: os dois extremos concentram as melhores tabelas.","Flexibilidade de datas e aeroportos vale mais que qualquer técnica avançada.","Milhas valem mais em emissões caras (internacional, executiva). Evite queimar saldo em passagem barata."],published:"2026-07-11",updated:"2026-07-11",blocks:[{t:"h2",id:"de-graca",text:'O que significa viajar "de graça" com milhas'},{t:"p",html:'Sejamos exatos: com milhas você não paga a <strong>tarifa</strong> da passagem, mas taxas de embarque e eventuais encargos continuam sendo cobrados em dinheiro. Uma emissão doméstica pode ter taxa na casa das dezenas de reais; internacionais variam bastante por aeroporto <mark class="verificar">[VERIFICAR: faixas de taxa atuais]</mark>. Ainda assim, o desconto real costuma passar de 90% do valor do bilhete: de graça no sentido que importa para o bolso.'},{t:"h2",id:"passo-a-passo",text:"Passo a passo da emissão"},{t:"ol",items:['Acumule no programa certo para a rota que você quer voar (veja o <a href="#/programas-de-milhas/">comparativo de programas</a>).',"Pesquise a emissão em milhas E o preço em dinheiro: a razão entre os dois diz se a emissão vale a pena.","Calcule o valor do milheiro embutido: preço em dinheiro ÷ milhas pedidas × 1.000. Abaixo da cotação de venda, venda as milhas e compre em dinheiro; acima, emita.","Emita com os dados corretos de todos os passageiros. Alterações depois custam caro.","Pague a taxa de embarque com um cartão que pontue: até a taxa vira milha."]},{t:"h2",id:"quando-emitir",text:"Quando emitir: os dois momentos de ouro"},{t:"p",html:"As melhores tabelas aparecem em dois extremos: <strong>bem antecipado</strong> (assentos promocionais liberados na abertura do calendário) e <strong>em promoções-relâmpago</strong>, quando programas baixam o custo de rotas específicas por horas ou dias. O meio do caminho (busca de última hora sem promoção) é onde as milhas valem menos."},{t:"h2",id:"multiplicar",text:"Como fazer o saldo render mais"},{t:"ul",items:["<strong>Seja flexível</strong>: mudar a data em 2–3 dias ou usar aeroporto alternativo frequentemente corta o custo em milhas pela metade.","<strong>Reserve o saldo para emissões caras</strong>: internacional e classe executiva costumam entregar mais valor por milha que voo doméstico barato.","<strong>Compare programas parceiros</strong>: a mesma rota pode custar menos milhas emitida por um programa parceiro do que pelo programa da própria companhia.","<strong>Monitore promoções</strong>: as melhores oportunidades duram horas. Quem acompanha canais e alertas emite; quem não acompanha paga tabela cheia."]},{t:"h2",id:"executiva",text:"E voar de executiva com milhas?"},{t:"p",html:"É o uso mais eficiente do saldo em termos de valor por milha: bilhetes de executiva que custariam dezenas de milhares de reais saem por um volume de milhas proporcionalmente menor. Exige mais saldo e mais flexibilidade. É o objetivo natural de quem já domina o acúmulo. Comece pelo básico, mas saiba que é para lá que o jogo evolui."},{t:"cta"}],faq:[{q:"Viajar com milhas é realmente de graça?",a:'A tarifa sai do saldo de milhas; taxas de embarque e encargos são pagos em dinheiro. Na prática o desconto costuma superar 90% do valor do bilhete. "De graça" é impreciso no rigor, mas descreve bem o efeito no orçamento de quem emite com método.'},{q:"Com quantas milhas consigo viajar?",a:"Trechos domésticos promocionais aparecem por valores a partir de poucos milhares de milhas; internacionais pedem dezenas de milhares. Os números mudam diariamente por rota, data e programa. A flexibilidade de datas reduz drasticamente o custo."},{q:"É melhor usar milhas ou vender e comprar a passagem?",a:"Faça a conta do milheiro embutido: preço em dinheiro dividido pelas milhas pedidas, vezes mil. Se o resultado ficar abaixo da cotação de venda do milheiro, vale mais vender as milhas e comprar em dinheiro; se ficar acima, a emissão vence."},{q:"Milhas servem para hotel, carro e outros gastos de viagem?",a:"Muitos programas permitem, mas o valor por milha nessas trocas costuma ser bem pior que em passagens. Como regra editorial: milha rende mais em avião. Use em hotel ou carro apenas quando houver promoção específica ou saldo perto de expirar."}],related:[{slug:"/como-acumular-milhas/",anchor:"Acumule as milhas da sua próxima viagem"},{slug:"/programas-de-milhas/",anchor:"Qual programa tem a melhor malha para você"},{slug:"/como-ganhar-dinheiro-com-milhas/",anchor:"Usar ou vender? A conta completa"}],checks:["Faixas de taxa de embarque doméstica/internacional atuais","Percentual de desconto médio (90%): validar com emissões de exemplo do mês"]},{slug:"/cursos-de-milhas/",type:"comparador",cluster:"Cursos",kicker:"Comparador",h1:"Cursos de milhas: o comparativo completo [2026]",seoTitle:"Curso de Milhas: Comparativo Completo 2026 | Fabricante de Milhas",metaDescription:"Comparamos os principais cursos de milhas do Brasil: conteúdo, preço, suporte, reputação e garantia. Análise com critérios públicos.",keyword:"curso de milhas",commercial:!0,answerFirst:"Segundo a análise da Equipe Fabricante de Milhas, o melhor curso de milhas para a maioria dos perfis em 2026 é o Fábrica de Milhas, do Rodrigo Góes, pela combinação de método completo e comunidade ativa. Alternativas fazem sentido para quem busca menor investimento inicial. Compare critérios, preços e reputação antes de decidir.",tldr:["Avaliamos cursos por 6 critérios públicos: conteúdo, custo-benefício, suporte, reputação, garantia e atualização.","Fábrica de Milhas é nossa recomendação principal: completo, com ressalvas de preço e suporte.","Alternativas de menor investimento existem e estão em avaliação [VERIFICAR].","Nenhum curso garante renda: desconfie de quem promete."],published:"2026-07-11",updated:"2026-07-11",blocks:[{t:"h2",id:"bom-curso",text:"O que um bom curso de milhas precisa ensinar"},{t:"ul",items:["<strong>Fundamentos</strong>: programas, pontos vs. milhas, validade, a base que evita erros caros.","<strong>Acúmulo com método</strong>: cartões, transferências bonificadas, clubes e compras estratégicas.","<strong>Uso inteligente</strong>: emissões que multiplicam o valor do saldo.","<strong>Venda com segurança</strong>: cotação, canais, riscos de plataforma e de bloqueio.","<strong>Atualização contínua</strong>: o mercado muda todo mês; curso parado no tempo é prejuízo."]},{t:"h2",id:"comparativo",text:"O comparativo"},{t:"table",caption:"Cursos de milhas comparados (dados [VERIFICAR] antes da publicação)",head:["Curso","Preço de referência","Destaques","Nossa avaliação"],rows:[["Fábrica de Milhas (Rodrigo Góes)","12x R$ 119,90 (1 ano) · jun/2026","8 níveis, aulas ao vivo, comunidade de promoções, garantia dupla","8,0/10 · recomendação principal"],["Alternativa A [VERIFICAR: curso, produtor e preço]","[VERIFICAR]","Perfil de menor investimento inicial [VERIFICAR]","Em avaliação"],["Alternativa B [VERIFICAR: curso, produtor e preço]","[VERIFICAR]","Foco em emissões/viagens [VERIFICAR]","Em avaliação"]],note:"Só publicamos nota de cursos que analisamos pela metodologia completa. As alternativas entram no ranking após validação humana dos dados."},{t:"h2",id:"recomendacao",text:"Nossa recomendação e por quê"},{t:"p",html:'O <a href="#/fabrica-de-milhas-vale-a-pena/">Fábrica de Milhas</a> é a recomendação principal por um motivo prático: é o único que combina, num pacote só, método progressivo completo e comunidade diária de promoções, o componente que mantém o conhecimento rendendo depois das aulas. As ressalvas (preço premium, reputação "Regular" no Reclame Aqui) estão detalhadas na análise completa, junto com o perfil de quem NÃO deve comprar.'},{t:"h2",id:"sem-curso",text:"Dá para aprender milhas sem pagar curso?"},{t:"p",html:'Dá, e este site existe para isso: os guias de <a href="#/como-acumular-milhas/">acúmulo</a>, <a href="#/vender-milhas-aereas/">venda</a> e <a href="#/como-viajar-de-graca-com-milhas/">emissão</a> são gratuitos e cobrem os fundamentos. O que um curso pago acrescenta é velocidade, profundidade nas estratégias avançadas e (no caso das boas comunidades) o fluxo diário de promoções. Comece pelo gratuito; pague quando souber exatamente o que está comprando.'},{t:"cta",variant:"review"}],faq:[{q:"Qual o melhor curso de milhas em 2026?",a:"Nossa recomendação principal é o Fábrica de Milhas, do Rodrigo Góes, avaliado em 8,0/10 pela nossa metodologia: método completo em 8 níveis e comunidade ativa de promoções. Alternativas de menor investimento estão em avaliação; compare antes de decidir."},{q:"Curso de milhas funciona mesmo?",a:"Um bom curso encurta a curva de aprendizado e evita erros caros, mas não substitui dedicação nem capital. Funciona para quem aplica o método com constância; frustra quem espera renda automática. Nenhum curso sério garante resultado."},{q:"Quanto custa um curso de milhas?",a:"A faixa de mercado vai de cursos de entrada mais baratos a treinamentos completos na casa dos milhares de reais. O Fábrica de Milhas, nossa referência, custava 12x de R$ 119,90 (acesso 1 ano) em jun/2026. Valores mudam por turma; confirme na página oficial."},{q:"Preciso de curso para começar com milhas?",a:"Não. Os fundamentos estão em conteúdo gratuito, incluindo nossos guias. O curso faz sentido quando você quer acelerar, operar volume ou acessar comunidade de promoções diárias. Comece grátis, meça seu interesse real e só então invista."}],related:[{slug:"/fabrica-de-milhas-vale-a-pena/",anchor:"Análise completa do Fábrica de Milhas"},{slug:"/rodrigo-goes-e-confiavel/",anchor:"Rodrigo Góes é confiável?"},{slug:"/melhor-curso-de-milhas/",anchor:"Melhor curso de milhas: o ranking"},{slug:"/como-acumular-milhas/",anchor:"Guia gratuito de acúmulo de milhas"}],checks:["Definir e validar alternativas A e B (curso, produtor, preço, garantia, reputação)","Preço vigente do Fábrica de Milhas na data de publicação"]},{slug:"/fabrica-de-milhas-vale-a-pena/",type:"review",cluster:"Cursos",kicker:"Análise completa",h1:"Fábrica de Milhas vale a pena? Análise honesta e completa [2026]",seoTitle:"Fábrica de Milhas Vale a Pena? Review Honesto 2026",metaDescription:"Análise completa do Fábrica de Milhas, do Rodrigo Góes: preço, garantia, reputação no Reclame Aqui, prós e contras. Veja se vale a pena em 2026.",keyword:"fábrica de milhas vale a pena",commercial:!0,answerFirst:'Segundo a análise da Equipe Fabricante de Milhas, o Fábrica de Milhas vale a pena para quem quer aprender a acumular e vender milhas com método estruturado e aceita retorno gradual. É um curso completo, com garantia dupla, mas preço acima da média e reputação "Regular" no Reclame Aqui pedem atenção. Nota da nossa avaliação: 8,0/10.',tldr:["O que é: treinamento de milhas do Rodrigo Góes em 8 níveis, com aulas gravadas, ao vivo e comunidade.","Preço (jun/2026): 12x R$ 119,90 (acesso 1 ano) ou 12x R$ 291,99 (vitalício), sujeito a mudança.",'Garantia: 7 dias incondicional + "risco zero" condicionada às estratégias do nível Platina.',"Principal pró: método completo do zero ao avançado, com comunidade ativa de promoções.",'Principal contra: reputação "Regular" (nota 6,6) no Reclame Aqui e retorno que depende de capital e dedicação.'],published:"2026-07-11",updated:"2026-07-16",rating:{value:8,itemName:"Fábrica de Milhas",itemDesc:"Treinamento online de milhas aéreas criado por Rodrigo Góes, com 8 níveis de conteúdo, aulas ao vivo e comunidade de promoções.",itemUrl:"https://lp.fabricademilha.com/"},blocks:[{t:"h2",id:"o-que-e",text:"O que é o Fábrica de Milhas"},{t:"p",html:'O <strong>Fábrica de Milhas</strong> é o treinamento de milhas aéreas do influenciador Rodrigo Góes, conhecido como "Mago das Milhas". A página oficial o apresenta como um passo a passo para construir uma "fábrica" de milhas. A promessa central anunciada é <em>"acumular 1 milhão de milhas nos próximos 6 meses"</em>. Registre-se: essa é a promessa <strong>da página de vendas</strong>, não uma constatação nossa; resultados variam conforme dedicação, capital disponível e condições do mercado.'},{t:"p",html:'Por trás do produto está a 4MULTIPLUS MIDIA DIGITAL LTDA (CNPJ 42.650.222/0001-08), sediada em Barueri-SP, empresa ativa e verificável, um sinal básico de seriedade que checamos em toda análise (veja nossa <a href="#/metodologia/">metodologia</a>).'},{t:"h2",id:"quem-e-rodrigo",text:"Quem é Rodrigo Góes"},{t:"p",html:'Rodrigo Góes construiu a marca "Mago das Milhas" e é hoje um dos maiores nomes do nicho no Brasil: seu Instagram <a href="https://go.hotmart.com/Y102512256Q?ap=4b86" target="_blank" rel="sponsored nofollow noopener">@goesrodrigo</a> soma 1,6 milhão de seguidores (jul/2026), e a bio declara mais de 130 mil alunos e mais de 112 milhões de milhas acumuladas, números autodeclarados por ele, que reportamos como tal.'},{t:"p",html:'A parte que dá para conferir sozinho: engenheiro mecânico natural de Salvador, ele largou a carreira embarcada numa empresa de petróleo em outubro de 2020 para viver de milhas, fundou a Fábrica de Milhas em 2019 e escreveu <em>O Mapa para Acumular 1 Milhão de Milhas</em>, livro que a imprensa registrou entre os mais vendidos da categoria. A <a href="https://www.cnnbrasil.com.br/viagemegastronomia/viagem/o-que-fazer-com-as-milhas-enquanto-nao-podemos-viajar-experts-respondem/" target="_blank" rel="noopener">CNN Brasil</a> o ouviu como especialista em 2021, e ele também aparece em <a href="https://extra.globo.com/tv-e-lazer/livro-mapa-para-acumular-1-milhao-de-milhas-de-rodrigo-goes-esta-entre-os-mais-vendidos-25398340.html" target="_blank" rel="noopener">Extra</a>, <a href="https://www.terra.com.br/vida-e-estilo/como-rodrigo-goes-viajou-mais-de-40-paises-com-milhas,28ed2a40010a04c2b0587dd9b4df1ae509649tos.html" target="_blank" rel="noopener">Terra</a>, <a href="https://www.redetv.uol.com.br/tvfama/blog/celebridades/conquistas-atraves-das-milhas-como-o-engenheiro-baiano-rodrigo-goes-transfo" target="_blank" rel="noopener">RedeTV!</a> e <a href="https://revistamensch.com.br/carreira-rodrigo-goes-o-incrivel-mago-das-milhas/" target="_blank" rel="noopener">Revista Mensch</a>. Quem assina o curso, portanto, tem nome, rosto e histórico público.'},{t:"p",html:'Há um dado que vale mais que qualquer número autodeclarado, porque você confere sozinho em cinco segundos: o canal <a href="https://go.hotmart.com/Y102512256Q?ap=11eb" target="_blank" rel="sponsored nofollow noopener">Rodrigo Goes no YouTube</a> é verificado e tinha <strong>886 mil inscritos e 420 vídeos publicados</strong> em julho de 2026. Quase 900 mil pessoas acompanhando e mais de 400 aulas gratuitas no ar não se constroem num lançamento: é um arquivo público de anos, exposto à crítica nos comentários.'},{t:"p",html:"Para você isso tem um uso prático e imediato: <strong>teste a didática dele de graça antes de pagar</strong>. Assista a alguns vídeos do canal e veja se o jeito de explicar encaixa com o seu. Se o conteúdo gratuito já te faz avançar, o curso tende a fazer sentido; se o estilo te incomoda, você economizou R$ 1.230 descobrindo isso agora. O vídeo de destaque é a participação dele no <strong>Mais Você</strong>, com Ana Maria Braga, com mais de 322 mil visualizações."},{t:"p",html:'Fizemos uma análise dedicada à confiabilidade do produtor em <a href="#/rodrigo-goes-e-confiavel/">Rodrigo Góes é confiável?</a>, recomendada para quem está avaliando o curso pela primeira vez.'},{t:"h2",id:"o-que-tem-dentro",text:"O que tem dentro do curso"},{t:"p",html:'O conteúdo é organizado em 8 níveis progressivos, do básico ao avançado. A carga horária anunciada tem uma inconsistência na própria página oficial: uma seção cita "+40h de aulas gravadas" e o FAQ cita "+30h". São, portanto, dezenas de horas de aulas gravadas (a página oficial cita entre 30h e 40h) <mark class="verificar">[VERIFICAR: carga horária exata]</mark>.'},{t:"table",caption:"Os 8 níveis do Fábrica de Milhas (conforme a página oficial, jun/2026)",head:["Nível","Foco"],rows:[["Bronze","Boas-vindas e fundamentos do método"],["Prata","Conceitos essenciais de milhas e pontos"],["Ouro","Estratégias de acúmulo"],["Safira","Uso das milhas (emissões e viagens)"],["Rubi","Venda de milhas"],["Platina","Recuperar o investimento no curso"],["Diamante","Classe executiva, salas VIP e status"],["Private","Estratégias avançadas"]]},{t:"p",html:'Além das aulas gravadas, o curso inclui <strong>aulas ao vivo com monitorias</strong> e a comunidade <strong>"Clube do Mago"</strong>, com promoções diárias e cotação do milheiro. A turma atual anuncia como bônus o "Mega Combo +10 imersões" (Disney, Paris, Maldivas etc.) e o próprio Clube do Mago, anunciados como R$ 1.194 em bônus gratuitos <mark class="verificar">[VERIFICAR: bônus vigentes na data de publicação]</mark>.'},{t:"h2",id:"preco",text:"Preço e formas de pagamento"},{t:"table",caption:"Preços da turma atual (coletados em jun/2026, sujeitos a mudança)",head:["Plano","Parcelado","À vista"],rows:[["Acesso por 1 ano","12x de R$ 119,90","R$ 1.230,60"],["Acesso vitalício","12x de R$ 291,99","R$ 2.997,00"]],note:'O preço "cheio" anunciado para o acesso de 1 ano é R$ 2.497. Valores [VERIFICAR na data da publicação]. Turmas e condições mudam.'},{t:"p",html:'Na comparação com o mercado, o Fábrica de Milhas posiciona-se <strong>acima da média de preço</strong> dos cursos de milhas <mark class="verificar">[VERIFICAR: média atual do mercado no comparador]</mark>. A régua de custo-benefício, portanto, depende de você usar o que mais encarece o produto: as aulas ao vivo e a comunidade de promoções.'},{t:"h2",id:"garantia",text:'Garantia: 7 dias + "risco zero" (leia as condições)'},{t:"p",html:'São duas garantias distintas. A primeira é a <strong>incondicional de 7 dias</strong>, padrão legal de produtos digitais: não gostou, pede reembolso. A segunda é a que a página chama de <strong>"garantia risco zero"</strong>: segundo as condições anunciadas pelo curso, se o aluno aplicar as 3 estratégias do nível Platina e não recuperar o valor investido em até 4 meses, a empresa devolve o valor pago. Atenção ao detalhe: é uma garantia <strong>condicionada</strong>: exige comprovar a aplicação das estratégias. Não a trate como reembolso automático.'},{t:"h2",id:"reputacao",text:"O que dizem os alunos: reputação real"},{t:"p",html:"No <strong>Reclame Aqui</strong> (período dez/2025 a mai/2026), a empresa aparece com <strong>perfil verificado</strong> e <strong>98,8% das reclamações respondidas</strong>, com 70,3% resolvidas. Foram 166 reclamações em seis meses, para uma base que o produtor declara em mais de 130 mil alunos: bases de cálculo diferentes, mas a ordem de grandeza já diz que reclamação formal é exceção por aqui."},{t:"p",html:'A nota fica em <strong>6,6/10</strong>, faixa que o Reclame Aqui chama de "Regular", puxada principalmente pelo tempo médio de resposta de 15 dias. Um detalhe que muda a leitura: os índices de resolução e o de 48,4% que voltariam a fazer negócio medem <strong>somente quem reclamou</strong>, o grupo mais insatisfeito por definição. Quase metade de quem abriu reclamação compraria de novo, o que é um dado melhor do que parece à primeira vista.'},{t:"ul",items:["<strong>Padrão de reclamação 1 (ritmo do suporte)</strong>: relatos de que o grupo de promoções e o suporte perdem ritmo depois que uma turma nova abre.","<strong>Padrão 2 (plataformas de venda indicadas no passado)</strong>: alunos citam prejuízos com plataformas de venda de milhas indicadas em aulas antigas (contexto da crise 123milhas/MaxMilhas/HotMilhas em 2023). O curso respondeu que retirou as aulas e que não tem relação com as empresas.","<strong>Padrão 3 (expectativa vs. realidade)</strong>: parte das frustrações nasce da diferença entre a expectativa de retorno rápido e a realidade de retorno gradual, que depende de dedicação e capital."]},{t:"h2",id:"pros-contras",text:"Prós e contras"},{t:"proscons",pros:["Método completo e progressivo: 8 níveis que levam do zero absoluto a estratégias avançadas (executiva, status, venda).","Comunidade ativa (Clube do Mago) com promoções diárias e cotação do milheiro. Na prática, é o que mantém o método funcionando no dia a dia.","Aulas ao vivo e monitorias, além do conteúdo gravado.",'Garantia dupla: 7 dias incondicional + "risco zero" condicionada.',"Produtor com empresa estabelecida e autoridade conferível: canal verificado no YouTube com 886 mil inscritos e 420 vídeos gratuitos (dá para testar a didática antes de comprar), livro publicado e matérias em CNN Brasil, Extra, Terra e RedeTV!."],cons:["Preço acima da média dos cursos de milhas [VERIFICAR média do mercado].",'Retorno depende de capital e dedicação, não é renda imediata, e a promessa de "1 milhão de milhas em 6 meses" é da página de vendas, não uma garantia.',"Histórico de reclamações sobre perda de ritmo do suporte e do grupo após abertura de turmas novas.",'Reputação "Regular" (6,6/10) no Reclame Aqui, com tempo médio de resposta de 15 dias.',"O mercado de venda de milhas embute risco de plataformas, como mostrou a crise 123milhas em 2023, e nenhum curso elimina esse risco."]},{t:"h2",id:"para-quem",text:"Para quem vale a pena (e para quem NÃO vale)"},{t:"h3",text:"Vale a pena para quem…"},{t:"ul",items:["Quer um método estruturado em vez de juntar dicas soltas de internet;","Tem gastos mensais concentráveis no cartão ou capital para operar com volume;","Pretende acompanhar promoções com frequência e tratar milhas como projeto de médio prazo;","Valoriza comunidade ativa e aulas ao vivo além do conteúdo gravado."]},{t:"h3",text:"NÃO vale a pena para quem…"},{t:"ul",items:["Espera renda garantida ou retorno na primeira semana, mas ninguém sério promete isso;","Tem orçamento apertado a ponto de o curso comprometer as contas (comece pelo conteúdo gratuito, inclusive o nosso);","Não pretende dedicar algumas horas por semana ao acompanhamento de promoções;","Só quer aprender o básico de acumular para uma viagem, já que, para isso, nossos guias gratuitos bastam."]},{t:"h2",id:"alternativas",text:"Alternativas ao Fábrica de Milhas"},{t:"p",html:'Nenhuma análise honesta termina sem alternativas. No nosso <a href="#/cursos-de-milhas/">comparador de cursos de milhas</a> avaliamos as opções relevantes do mercado, incluindo alternativas de menor investimento inicial <mark class="verificar">[VERIFICAR: catálogo, preços e condições das alternativas antes de publicar]</mark>. Se a sua dúvida é entre pagar um curso ou começar sozinho, comece pelos nossos guias gratuitos de <a href="#/como-acumular-milhas/">acúmulo</a> e <a href="#/vender-milhas-aereas/">venda</a>, e volte ao curso quando quiser velocidade.'},{t:"h2",id:"veredito",text:"Veredito final: nota 8,0/10"},{t:"p",html:'O Fábrica de Milhas é um curso sólido, completo e operado por uma empresa real com o maior nome do nicho à frente. Os contras são igualmente reais: preço premium, reputação "Regular" no Reclame Aqui e a dependência (inevitável em milhas) de capital, dedicação e mercado. Pelos critérios da nossa <a href="#/metodologia/">metodologia</a> (conteúdo, custo-benefício, suporte, reputação, garantia e atualização), a nota é <strong>8,0/10</strong> <mark class="verificar">[VERIFICAR: nota final ratificada pela equipe antes de publicar]</mark>: recomendado para quem se encaixa no perfil descrito acima, com as ressalvas na mesa.'},{t:"cta",variant:"review"}],faq:[{q:"O Fábrica de Milhas vale a pena?",a:'Para quem quer método estruturado, comunidade ativa de promoções e aceita retorno gradual, sim: nossa avaliação é 8,0/10. Para quem espera renda garantida ou não pode dedicar tempo e capital, não. Os contras: preço acima da média e reputação "Regular" no Reclame Aqui.'},{q:"O Fábrica de Milhas é confiável?",a:'Os sinais públicos indicam operação real: empresa registrada (CNPJ ativo em Barueri-SP), produtor com livro publicado e matérias na imprensa, perfil verificado no Reclame Aqui com 98,8% das reclamações respondidas e 166 registros em seis meses, para uma base declarada de mais de 130 mil alunos. A nota 6,6 ("Regular") reflete tempo de resposta do suporte, não indício de golpe.'},{q:"Quanto custa o Fábrica de Milhas?",a:"Na turma de junho/2026: acesso por 1 ano em 12x de R$ 119,90 (R$ 1.230,60 à vista) ou vitalício em 12x de R$ 291,99 (R$ 2.997,00 à vista). Os valores mudam entre turmas, então confirme na página oficial antes de decidir."},{q:"O Fábrica de Milhas tem garantia?",a:'Duas: reembolso incondicional em 7 dias e a "garantia risco zero": se o aluno aplicar as 3 estratégias do nível Platina e não recuperar o investimento em até 4 meses, a empresa devolve o valor. A segunda é condicionada: exige comprovar a aplicação das estratégias.'},{q:"O Fábrica de Milhas funciona para iniciantes?",a:"Sim. A estrutura em níveis começa do zero (Bronze e Prata cobrem fundamentos) e evolui até estratégias avançadas. Iniciantes tendem a aproveitar mais a comunidade de promoções se já tiverem um cartão que pontue e gastos concentráveis nele."},{q:"Dá para recuperar o investimento no curso?",a:"O curso dedica um nível inteiro (Platina) a isso e ancora a garantia estendida nessas estratégias. É plausível para quem opera com dedicação e capital, mas não é automático nem garantido: resultados variam conforme gasto mensal, campanhas do período e mercado de venda de milhas."}],related:[{slug:"/rodrigo-goes-e-confiavel/",anchor:"Rodrigo Góes é confiável? Análise do produtor"},{slug:"/cursos-de-milhas/",anchor:"Comparador: todos os cursos de milhas analisados"},{slug:"/como-acumular-milhas/",anchor:"Guia gratuito: como acumular milhas"},{slug:"/vender-milhas-aereas/",anchor:"Guia gratuito: como vender milhas"}],checks:["Preço vigente na data de publicação (turma atual)","Carga horária exata (página diz 40h numa seção e 30h no FAQ)","Bônus vigentes da turma atual (Mega Combo, Clube do Mago)",'Média de preço do mercado de cursos (base do contra "preço acima da média")',"Nota final 8,0 ratificada pela equipe","TESTE DO LINK DE AFILIADO: clicar e confirmar rastreamento da comissão no painel antes de publicar"]},{slug:"/rodrigo-goes-e-confiavel/",type:"review",cluster:"Cursos",kicker:"Análise completa",h1:"Rodrigo Góes é confiável? O que os dados públicos mostram [2026]",seoTitle:"Rodrigo Góes É Confiável? Análise com Dados 2026",metaDescription:'Rodrigo Góes, o "Mago das Milhas", é confiável? Empresa, números públicos, Reclame Aqui e histórico analisados a fundo pela Fabricante de Milhas.',keyword:"Rodrigo Góes milhas é confiável",commercial:!0,answerFirst:'Segundo a análise da Equipe Fabricante de Milhas, os sinais públicos indicam que Rodrigo Góes é um produtor real e estabelecido: empresa ativa com CNPJ, canal verificado no YouTube com 886 mil inscritos e 420 vídeos, e perfil verificado no Reclame Aqui com 98,8% das reclamações respondidas. Confiável não significa perfeito: a reputação "Regular" (6,6/10) mostra atritos reais de suporte.',tldr:["Empresa real: 4MULTIPLUS MIDIA DIGITAL LTDA, CNPJ 42.650.222/0001-08, Barueri-SP.","YouTube verificado com 886 mil inscritos e 420 vídeos: histórico público e conferível (jul/2026).","Imprensa: CNN Brasil, Extra, Terra, RedeTV! e Revista Mensch já publicaram sobre ele.",'Autor do livro "O Mapa para Acumular 1 Milhão de Milhas", citado entre os mais vendidos.',"Audiência: 1,6 milhão de seguidores no Instagram (@goesrodrigo, jul/2026).",'Números "130 mil alunos" e "112 milhões de milhas" são autodeclarados na bio dele.','Reclame Aqui: perfil verificado, 98,8% das reclamações respondidas e 166 em seis meses. Nota 6,6/10 ("Regular"), puxada pelo tempo de resposta.',"Veredito: operação legítima, com ressalvas normais de suporte, sem indício de golpe."],published:"2026-07-11",updated:"2026-07-16",blocks:[{t:"h2",id:"quem-e",text:"Quem é Rodrigo Góes"},{t:"p",html:'Rodrigo Góes é o criador do curso <a href="#/fabrica-de-milhas-vale-a-pena/">Fábrica de Milhas</a> e uma das maiores audiências do nicho de milhas no Brasil, sob a marca "Mago das Milhas". Seu Instagram <a href="https://go.hotmart.com/Y102512256Q?ap=4b86" target="_blank" rel="sponsored nofollow noopener">@goesrodrigo</a> reunia 1,6 milhão de seguidores em julho de 2026. A bio declara "+130 mil alunos" e "+112 milhões de milhas acumuladas", números <strong>autodeclarados</strong>, que reportamos como tal por não haver auditoria independente.'},{t:"p",html:"A trajetória tem datas verificáveis: engenheiro mecânico natural de Salvador, ele trabalhou embarcado numa empresa de petróleo até outubro de 2020, quando largou a profissão para viver de milhas. Fundou a Fábrica de Milhas em 2019 e publicou o livro <em>O Mapa para Acumular 1 Milhão de Milhas</em>, que a imprensa registrou entre os mais vendidos da categoria."},{t:"h2",id:"imprensa",text:"O que a imprensa já publicou sobre ele"},{t:"p",html:"Cobertura de imprensa não é atestado de qualidade de curso: veículo publica perfil de gente interessante, não de gente honesta. Mas serve para uma coisa específica nesta análise: <strong>confirma que a pessoa existe, tem histórico e assume publicamente o que faz</strong>. Golpe não dá entrevista com nome e rosto. Estas são as matérias que localizamos:"},{t:"ul",items:['<strong><a href="https://www.cnnbrasil.com.br/viagemegastronomia/viagem/o-que-fazer-com-as-milhas-enquanto-nao-podemos-viajar-experts-respondem/" target="_blank" rel="noopener">CNN Brasil</a></strong> (abril de 2021): é ouvido como especialista em milhas e autor do livro, respondendo dúvidas de leitores sobre o que fazer com o saldo durante a pandemia.','<strong><a href="https://extra.globo.com/tv-e-lazer/livro-mapa-para-acumular-1-milhao-de-milhas-de-rodrigo-goes-esta-entre-os-mais-vendidos-25398340.html" target="_blank" rel="noopener">Extra</a></strong>, do Grupo Globo: registra o livro dele entre os mais vendidos.','<strong><a href="https://www.terra.com.br/vida-e-estilo/como-rodrigo-goes-viajou-mais-de-40-paises-com-milhas,28ed2a40010a04c2b0587dd9b4df1ae509649tos.html" target="_blank" rel="noopener">Terra</a></strong>: conta como ele viajou a mais de 40 países usando milhas.','<strong><a href="https://revistamensch.com.br/carreira-rodrigo-goes-o-incrivel-mago-das-milhas/" target="_blank" rel="noopener">Revista Mensch</a></strong> (dezembro de 2024): perfil de carreira, com a saída da engenharia e os números da operação.','<strong><a href="https://www.redetv.uol.com.br/tvfama/blog/celebridades/conquistas-atraves-das-milhas-como-o-engenheiro-baiano-rodrigo-goes-transfo" target="_blank" rel="noopener">RedeTV!</a></strong>, no TV Fama: a história do engenheiro baiano que mudou de vida com milhas.','<strong><a href="https://globoplay.globo.com/v/13165946/" target="_blank" rel="noopener">Globoplay</a></strong>: participação em TV disponível na plataforma da Globo.']},{t:"p",html:"Um detalhe que vale para você calibrar expectativa: a matéria da CNN é de 2021 e a da Mensch é de 2024. Nela, os números citados são de mais de 100 mil alunos, contra os mais de 130 mil que a bio dele declara hoje. As cifras crescem com o tempo, e essa diferença é coerente, não contradição."},{t:"h2",id:"youtube",text:"O canal no YouTube: a autoridade que dá para conferir"},{t:"p",html:'Aqui está o dado mais útil desta análise, porque é o único que não depende da palavra dele. O canal <a href="https://go.hotmart.com/Y102512256Q?ap=11eb" target="_blank" rel="sponsored nofollow noopener">Rodrigo Goes</a> (@RodrigoGoesfabricademilhas) é <strong>verificado pelo YouTube</strong> e reunia, em julho de 2026, <strong>886 mil inscritos e 420 vídeos publicados</strong>. Diferente dos números de milhas e de alunos, essas métricas são contadores públicos da plataforma: qualquer pessoa abre o canal e confere em cinco segundos.'},{t:"p",html:"O que isso diz sobre confiabilidade: 420 vídeos não se produzem em um lançamento. É um histórico longo de conteúdo gratuito, exposto à crítica pública nos comentários, que sustenta a audiência de quase 900 mil pessoas. Golpista não constrói arquivo público desse tamanho, porque arquivo público é justamente o que prende o autor às próprias afirmações."},{t:"p",html:"O canal também é a melhor forma de avaliar a didática dele <strong>sem gastar nada</strong>. Antes de comprar qualquer curso, veja alguns vídeos e sinta se o jeito de ensinar combina com você. O vídeo de destaque, por exemplo, é a participação dele no <strong>Mais Você</strong>, com Ana Maria Braga, com mais de 322 mil visualizações, publicado há cerca de cinco anos. É a evidência mais concreta das aparições na mídia que ele cita."},{t:"h2",id:"empresa",text:"A empresa por trás: dados verificáveis"},{t:"p",html:'O curso é operado pela <strong>4MULTIPLUS MIDIA DIGITAL LTDA</strong>, CNPJ 42.650.222/0001-08, sediada em Barueri-SP. Empresa registrada, endereço declarado e canais de contato (e-mail, WhatsApp, Instagram) são o primeiro filtro da nossa <a href="#/metodologia/">metodologia</a>, e aqui todos se confirmam. Golpes típicos operam sem CNPJ rastreável; não é o caso.'},{t:"h2",id:"reclame-aqui",text:"Reclame Aqui: o que os números realmente mostram"},{t:"p",html:"Esta é a pesquisa que todo mundo faz antes de comprar, então vamos aos dados do período dez/2025 a mai/2026. A empresa mantém <strong>perfil verificado</strong> e respondeu <strong>98,8% das reclamações</strong>. Foram <strong>166 reclamações em seis meses</strong>. Para dar escala a esse número: o produtor declara uma base de mais de 130 mil alunos. As duas contas têm bases diferentes (uma é semestral, a outra é acumulada), mas a ordem de grandeza mostra o essencial: <strong>reclamação formal aqui é exceção, não padrão</strong>."},{t:"p",html:'A nota é <strong>6,6/10</strong>, que o Reclame Aqui classifica como "Regular", e o que puxa esse número para baixo é o tempo médio de resposta, de 15 dias. Vale entender o que esses índices medem: <strong>70,3% de resolução e 48,4% que voltariam a fazer negócio dizem respeito apenas a quem reclamou</strong>, ou seja, ao grupo mais insatisfeito por definição. Quase metade das pessoas que abriram uma reclamação compraria de novo, o que é bem diferente da leitura apressada de que "metade dos alunos não voltaria".'},{t:"p",html:'O que isso responde sobre confiança: golpe não tem perfil verificado, não responde 98,8% e não resolve 7 em cada 10 casos. O retrato aqui é de <strong>suporte pressionado nos picos de lançamento</strong>, que é o gargalo clássico de operação grande de infoproduto, e não de má-fé. É um ponto de atenção legítimo, não um sinal de alerta. Os temas recorrentes (ritmo do grupo após turmas novas, expectativa de retorno rápido e o episódio das plataformas de venda em 2023) estão detalhados na nossa <a href="#/fabrica-de-milhas-vale-a-pena/">análise completa do curso</a>.'},{t:"h2",id:"episodio-123",text:"O episódio 123milhas: o que ele diz (e o que não diz)"},{t:"p",html:"Alunos relataram prejuízo com plataformas de venda de milhas indicadas em aulas antigas, no contexto da crise 123milhas/MaxMilhas/HotMilhas de 2023. O curso respondeu que retirou as aulas e que não tem relação societária com as empresas. Leitura justa: indicar plataformas que depois quebraram foi um erro de curadoria (compartilhado, à época, por boa parte do nicho), não um esquema do produtor. Ainda assim, é um lembrete de que <strong>risco de plataforma é do mercado</strong>, e nenhum guru o elimina."},{t:"h2",id:"sinais",text:"Sinais de confiança vs. pontos de atenção"},{t:"proscons",pros:["Empresa ativa e rastreável (CNPJ, sede, canais de contato).","Canal verificado no YouTube com 886 mil inscritos e 420 vídeos: histórico público, longo e conferível por qualquer um.","Identidade pública consolidada: 1,6 milhão de seguidores, livro publicado e matérias em CNN Brasil, Extra, Terra, RedeTV! e Revista Mensch, todas linkadas acima.","Perfil verificado no Reclame Aqui, com quase todas as reclamações respondidas.","Produto real, com garantia de 7 dias e política de reembolso declarada."],cons:['Reputação "Regular" (6,6/10), abaixo do que a operação poderia entregar.',"Tempo médio de resposta de 15 dias no Reclame Aqui.","Números de alunos e milhas são autodeclarados, sem auditoria externa.",'Marketing agressivo de promessa ("1 milhão de milhas em 6 meses") que exige leitura crítica do comprador.']},{t:"h2",id:"veredito",text:"Veredito: confiável, com ressalvas de suporte"},{t:"p",html:'Rodrigo Góes passa nos filtros objetivos de legitimidade: empresa real, produto real, reputação pública administrada. Não encontramos indício de golpe. As ressalvas são as de uma operação grande de infoproduto: suporte pressionado em picos e promessa de marketing que precisa ser lida como marketing. Se a dúvida é sobre o curso em si (conteúdo, preço, garantia e para quem faz sentido), a resposta completa está em <a href="#/fabrica-de-milhas-vale-a-pena/">Fábrica de Milhas vale a pena?</a>.'},{t:"cta",variant:"review"}],faq:[{q:"Rodrigo Góes é confiável?",a:'Os sinais públicos indicam que sim: empresa registrada e ativa, canal verificado no YouTube com 886 mil inscritos e 420 vídeos, matérias em CNN Brasil, Extra, Terra e RedeTV!, livro publicado e perfil verificado no Reclame Aqui com 98,8% de resposta. A reputação "Regular" (6,6/10) aponta atritos de suporte, não indício de fraude.'},{q:"Rodrigo Góes tem canal no YouTube?",a:"Sim. O canal Rodrigo Goes (@RodrigoGoesfabricademilhas) é verificado e reunia 886 mil inscritos e 420 vídeos publicados em julho de 2026. É o melhor lugar para avaliar a didática dele de graça antes de considerar qualquer curso, e o vídeo de destaque é a participação no Mais Você, com Ana Maria Braga."},{q:"O curso do Rodrigo Góes é golpe?",a:"Não há indício disso. Golpes operam sem CNPJ, sem canal de contato, sem responder reclamações e sem dar entrevista de nome e rosto para CNN Brasil ou RedeTV!, o oposto do padrão verificado aqui. Existe, porém, distância entre a promessa de marketing e o resultado típico: retorno com milhas é gradual e depende de dedicação e capital."},{q:"Quantos alunos o Rodrigo Góes tem?",a:"A bio oficial declara mais de 130 mil alunos (jun/2026). O número é autodeclarado, sem auditoria independente. Por isso o reportamos como declaração do produtor, não como fato verificado por terceiros."},{q:"Qual a nota do Rodrigo Góes no Reclame Aqui?",a:'No período dez/2025–mai/2026, o perfil verificado da empresa registrava nota 6,6/10, reputação "Regular", com 166 reclamações, 98,8% respondidas e 70,3% resolvidas. Dados desse tipo mudam mensalmente; confira o perfil atualizado antes de decidir.'},{q:"Vale a pena comprar o curso dele?",a:"Depende do seu perfil: quem quer método completo e comunidade ativa tende a aproveitar; quem espera renda garantida ou não tem tempo para acompanhar promoções, não. Nossa análise completa, com preço, garantia, prós e contras, dá a resposta detalhada."}],related:[{slug:"/fabrica-de-milhas-vale-a-pena/",anchor:"Fábrica de Milhas vale a pena? Análise completa"},{slug:"/cursos-de-milhas/",anchor:"Comparador de cursos de milhas"},{slug:"/como-ganhar-dinheiro-com-milhas/",anchor:"Como ganhar dinheiro com milhas (guia gratuito)"}],extraLd:[{"@type":"Person","@id":"https://fabricantedemilhas.com.br/rodrigo-goes-e-confiavel/#rodrigo-goes",name:"Rodrigo Góes",alternateName:"Mago das Milhas",description:"Engenheiro mecânico natural de Salvador, educador especializado em milhas aéreas, fundador da Fábrica de Milhas (2019) e autor do livro O Mapa para Acumular 1 Milhão de Milhas.",jobTitle:"Educador e produtor de conteúdo sobre milhas aéreas",nationality:"BR",birthPlace:{"@type":"Place",name:"Salvador, Bahia, Brasil"},knowsAbout:["milhas aéreas","programas de fidelidade","cartões de crédito","viagens"],worksFor:{"@type":"Organization",name:"4MULTIPLUS MIDIA DIGITAL LTDA"},sameAs:["https://www.instagram.com/goesrodrigo/","https://www.youtube.com/@RodrigoGoesfabricademilhas"],subjectOf:["https://www.cnnbrasil.com.br/viagemegastronomia/viagem/o-que-fazer-com-as-milhas-enquanto-nao-podemos-viajar-experts-respondem/","https://extra.globo.com/tv-e-lazer/livro-mapa-para-acumular-1-milhao-de-milhas-de-rodrigo-goes-esta-entre-os-mais-vendidos-25398340.html","https://www.terra.com.br/vida-e-estilo/como-rodrigo-goes-viajou-mais-de-40-paises-com-milhas,28ed2a40010a04c2b0587dd9b4df1ae509649tos.html","https://revistamensch.com.br/carreira-rodrigo-goes-o-incrivel-mago-das-milhas/","https://www.redetv.uol.com.br/tvfama/blog/celebridades/conquistas-atraves-das-milhas-como-o-engenheiro-baiano-rodrigo-goes-transfo"]},{"@type":"Book",name:"O Mapa para Acumular 1 Milhão de Milhas",author:{"@id":"https://fabricantedemilhas.com.br/rodrigo-goes-e-confiavel/#rodrigo-goes"},inLanguage:"pt-BR",about:["milhas aéreas","programas de fidelidade","viagens"]}],checks:["Seguidores do Instagram e inscritos do YouTube na data de publicação"]},{slug:"/melhor-curso-de-milhas/",type:"comparador",cluster:"Cursos",kicker:"Ranking",h1:"Melhor curso de milhas em 2026: o ranking da Fabricante de Milhas",seoTitle:"Melhor Curso de Milhas 2026: Ranking Honesto | Fabricante de Milhas",metaDescription:"Ranking do melhor curso de milhas em 2026 com critérios públicos: conteúdo, preço, suporte, reputação e garantia. Veja quem lidera e por quê.",keyword:"melhor curso de milhas",commercial:!0,answerFirst:"Segundo o ranking da Equipe Fabricante de Milhas, o melhor curso de milhas em 2026 é o Fábrica de Milhas, do Rodrigo Góes (nota 8,0/10): método mais completo e comunidade mais ativa do mercado, apesar do preço acima da média. As posições seguintes estão em avaliação pela nossa metodologia pública.",tldr:["1º lugar: Fábrica de Milhas, 8,0/10 (completo; ressalvas de preço e suporte).","Posições seguintes em avaliação [VERIFICAR]: só ranqueamos o que analisamos por completo.","Critérios públicos: conteúdo, custo-benefício, suporte, reputação, garantia, atualização."],published:"2026-07-11",updated:"2026-07-11",blocks:[{t:"h2",id:"ranking",text:"O ranking 2026"},{t:"table",caption:"Ranking atualizado em jul/2026",head:["Posição","Curso","Nota","Para quem"],rows:[["1º","Fábrica de Milhas (Rodrigo Góes)","8,0/10","Quem quer o método completo + comunidade diária de promoções"],["2º","[VERIFICAR: alternativa em avaliação]","—","Perfil de menor investimento inicial"],["3º","[VERIFICAR: alternativa em avaliação]","—","Foco em emissões e viagens"]],note:"Não publicamos nota sem análise completa. Ranking revisado a cada atualização de página."},{t:"h2",id:"por-que-lidera",text:"Por que o Fábrica de Milhas lidera"},{t:"p",html:'Três razões objetivas: cobertura (8 níveis, do zero à executiva e à venda de milhas), suporte vivo (aulas ao vivo + Clube do Mago com promoções diárias) e garantia dupla. E duas ressalvas igualmente objetivas: preço premium e reputação "Regular" no Reclame Aqui. A conta completa (com números, prós, contras e para quem NÃO serve) está na <a href="#/fabrica-de-milhas-vale-a-pena/">análise completa</a>.'},{t:"h2",id:"criterios",text:"Como ranqueamos (critérios públicos)"},{t:"ul",items:["<strong>Conteúdo e didática (25%)</strong>: cobertura do básico ao avançado, clareza, organização.","<strong>Custo-benefício (20%)</strong>: preço vs. entrega, formas de pagamento.","<strong>Suporte e comunidade (15%)</strong>: canais, ritmo, monitorias, grupo de promoções.","<strong>Reputação e confiança (20%)</strong>: Reclame Aqui, empresa, histórico público.","<strong>Garantia e transparência (10%)</strong>: política de reembolso e clareza das condições.","<strong>Atualização (10%)</strong>: frequência de novas aulas e adaptação a mudanças do mercado."]},{t:"cta",variant:"review"}],faq:[{q:"Qual é o melhor curso de milhas em 2026?",a:"Pelo nosso ranking, o Fábrica de Milhas, do Rodrigo Góes, com nota 8,0/10: é o método mais completo e a comunidade mais ativa que avaliamos. Ele custa acima da média; para orçamentos menores, acompanhe as alternativas em avaliação no comparador."},{q:"O ranking é pago pelos cursos?",a:"Não. Somos remunerados por afiliação quando você compra pelos nossos links, como detalhado na página de divulgação (link no rodapé). A nota sai da metodologia pública de 6 critérios, e os contras de cada curso ficam no texto, inclusive do líder do ranking."},{q:"Cursos baratos de milhas valem a pena?",a:"Alguns servem como porta de entrada, mas avalie o que fica de fora: comunidade de promoções e atualização contínua são o que sustenta resultado no longo prazo. Curso barato sem suporte vivo costuma virar PDF esquecido. Compare pelo custo por benefício, não pelo preço absoluto."}],related:[{slug:"/cursos-de-milhas/",anchor:"Comparador completo de cursos de milhas"},{slug:"/fabrica-de-milhas-vale-a-pena/",anchor:"Análise completa do líder do ranking"},{slug:"/metodologia/",anchor:"Nossa metodologia de avaliação"}],checks:["Alternativas do ranking (2º e 3º) analisadas e validadas","Nota e preço do líder revisados na data de publicação"]},{slug:"/milhas-aereas-como-renda-extra/",type:"satelite",cluster:"Ganhar dinheiro",kicker:"Guia",h1:"Milhas aéreas como renda extra: expectativa realista para 2026",seoTitle:"Milhas Aéreas Como Renda Extra: Guia Realista | Fabricante de Milhas",metaDescription:"Milhas aéreas como renda extra: o que é realista esperar, quanto tempo exige, os riscos e o passo a passo honesto para começar em 2026.",keyword:"milhas aéreas como renda extra",answerFirst:"Segundo a análise da Fabricante de Milhas, milhas aéreas funcionam como renda extra, não como salário. O ganho vem de acumular o milheiro barato (cartão + bônus) e vender mais caro, num ciclo de 30 a 60 dias. O valor varia com seus gastos, capital e mercado; ninguém honesto promete cifra fixa mensal.",tldr:["Renda extra realista: complemento variável, não substituto de salário.","O motor: gastos que você já tem, concentrados num cartão que pontua, + transferências bonificadas.","Ciclo típico acumular → bonificar → vender: 30 a 60 dias.","Riscos: bloqueio de conta, contraparte de plataforma e mudanças de regra."],published:"2026-07-11",updated:"2026-07-11",blocks:[{t:"h2",id:"expectativa",text:"A expectativa certa: complemento, não salário"},{t:"p",html:'A pergunta que todo mundo faz é "quanto dá por mês?", e a resposta honesta é: <strong>depende do seu volume de gastos e do capital que você gira</strong>. Quem concentra gastos domésticos num bom cartão e opera campanhas de bônus transforma despesa que já existia em um complemento variável. Quem promete cifra fixa está vendendo fantasia (e violando o bom senso; resultados variam).'},{t:"h2",id:"motor",text:"De onde a renda vem, na prática"},{t:"ol",items:['Seus gastos mensais viram pontos no cartão (<a href="#/cartao-de-credito-para-milhas/">o cartão certo</a> importa).','Os pontos são transferidos com bônus para um programa aéreo (<a href="#/como-acumular-milhas/">o guia de acúmulo</a> detalha).','O milheiro é vendido pela cotação do momento (<a href="#/vender-milhas-aereas/">o guia de venda</a> mostra os canais e riscos).',"A diferença entre custo e venda é a sua margem, que se repete a cada ciclo de 30–60 dias."]},{t:"h2",id:"quem-consegue",text:"Quem consegue (e quem se frustra)"},{t:"p",html:'Consegue: quem tem gastos concentráveis, disciplina para pagar a fatura integral (juros matam qualquer margem) e paciência para esperar campanhas. Se frustra: quem entra sem capital de giro, esperando resultado na primeira semana, ou financiando gasto novo só para pontuar, o erro cl
